<!DOCTYPE html>
<html lang ="vi">
<html>

<head>
	<title>Hóa đơn thanh toán </title>
	<link rel="stylesheet" href="../css/style4.css">
	<meta charset ="utf-8">
</head>
<body>
    <h1>Hóa đơn thanh toán</h1>
	<table>
	<tr>
		<th>STT</th>
		<th>Tên sản phẩm</th>
		<th>Số lượng</th>
		<th>Đơn giá</th>
		<th>Thành tiền</th>
	</tr>
	<tr>
		<td>1</td>
		<td>A</td>
		<td class ="SoLuong">3</td>
		<td class ="DonGia">1000</td>
		<td class ="ThanhTien"></td>
	</tr>
	<tr>
		<td>2</td>
		<td>B</td>
		<td class ="SoLuong">4</td>
		<td class ="DonGia">2000</td>
		<td class ="ThanhTien"></td>
	</tr>
	<tr>
		<td>3</td>
		<td>C</td>
		<td class ="SoLuong">5</td>
		<td class ="DonGia">4000</td>
		<td class ="ThanhTien"></td>
		
	</tr>
	<tr>
		<td>4</td>
		<td>D</td>
		<td class ="SoLuong">2</td>
		<td class ="DonGia">5000</td>
		<td class ="ThanhTien"></td>
	</tr>
	<tr>
		<th colspan="3">Tổng thanh toán</th>
		<td colspan="2" id ="S"></td>	
	</tr>
</table>
<script>
	const SoLuong = document.getElementsByClassName("SoLuong");
	const DonGia = document.getElementsByClassName("DonGia");
	const ThanhTien = document.getElementsByClassName("ThanhTien");
	let S=0;
	for(let i = 0;i< DonGia.length; i++){
		ThanhTien[i].innerHTML = SoLuong[i].innerHTML*DonGia[i].innerHTML;
		S = S + parseInt(ThanhTien[i].innerHTML);
	}
	document.getElementById("S").innerHTML =S; 
</script>
	</body>
</html>
