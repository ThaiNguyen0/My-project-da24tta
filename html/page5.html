<!DOCTYPE html>
<html lang ="vi">
<html>

<head>
	<title> Bảng cửu chương</title>
	<meta charset ="utf-8">
</head>
<body>
	<form id="FrmInBCC">
	<h1>Bảng cửu chương</h1>
	<label>Nhập số từ 2-9</label>
	<input id = "numBCC" name = "numBCC" type = "number" min = "2" max = "9">
	<button type ="button" onclick = "InBCC()">In</button>
	<div id ="KQ">
	</div>
</form>
<script>
	function InBCC(){
		const myForm = document.forms["FrmInBCC"];
		const myNumber = myForm.elements[0];
		let num = parseInt(myNumber.value);
		let kq ="";
		for(let i=1;i<=10; i++){
		kq += num +" x "+ i +" = "+(num * i) + "<br>";
		}
		document.getElementById("KQ").innerHTML = kq;
	}
</script>
	</body>
</html>
