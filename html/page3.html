<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký thành viên</title>
    <link rel="stylesheet" href="../css/style3.css"> 
</head>
<body>
    <div class="container">
        <h3 id="title">ĐĂNG KÝ HỆ THỐNG</h3>
        
        <form id="frmRegister">
            <div class="form-group">
                Họ và tên:<br>
                <input type="text" class="form-control">
            </div>

            <div class="form-group">
                MSSV:<br>
                <input type="text" class="form-control">
            </div>

            <div class="form-group">
                Lớp:<br>
                <select class="form-control">
                    <option value="DA24TTA">DA24TTA</option>
                    <option value="DA24TTB">DA24TTB</option>
                    <option value="DA24TTC">DA24TTC</option>
                    <option value="DA24TTD">DA24TTD</option>
                </select>
            </div>

            <div class="form-group">
                Ngày sinh:<br>
                <input type="date" class="form-control">
            </div>

            <div class="form-group">
                Địa chỉ:<br>
                <input type="text" class="form-control">
            </div>

            <div class="form-group">
                Số điện thoại:<br>
                <input type="text" class="form-control">
            </div>

            <div class="form-group">
                Giới tính:<br>
                <input type="radio" name="gioitinh" value="Nam"> Nam 
                <input type="radio" name="gioitinh" value="Nữ"> Nữ
            </div>

            <div class="form-group">
                Điểm mạnh:<br>
                <input type="checkbox" value="web"> Lập trình web <br>
                <input type="checkbox" value="edit"> Chỉnh sửa video <br>
                <input type="checkbox" value="game"> Chơi game <br>
            </div>

            <div class="form-group">
                Giới thiệu bản thân:<br>
                <textarea class="form-control" rows="4"></textarea>
            </div>

            <input type="submit" class="button" value="Đăng ký">
            <input type="reset" class="button" value="Nhập lại">
        </form>
    </div>
</body>
</html>
